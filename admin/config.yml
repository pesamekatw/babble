backend:
  name: git-gateway
  branch: main

media_folder: "images/portfolio"
public_folder: "/images/portfolio"

collections:
  - name: "works"
    label: "Τα Έργα μας"
    folder: "content/works"
    extension: json
    format: json
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Τίτλος Έργου", name: "title", widget: "string" }
      - { label: "Ημερομηνία", name: "date", widget: "datetime" }
      - { label: "Φωτογραφία Έργου (Κύρια)", name: "image", widget: "image" }
      - label: "Γαλερί Φωτογραφιών"
        name: "gallery"
        widget: "list"
        field: { label: "Φωτογραφία", name: "photo", widget: "image" }
        allow_add: true
      - { label: "Περιγραφή", name: "body", widget: "markdown" }